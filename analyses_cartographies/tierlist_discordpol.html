    --red: #e94560;

    --text: #e0e0f0;

  body {

  }

  .header {

    padding: 28px 32px 22px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(233,69,96,.12) 0%, transparent 60%);

  .header h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
  .header h1 span { color: var(--red); }
  .header-sub { font-size: 12px; color: var(--text-dim); margin-top: 3px; }

  .header-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    padding: 8px 18px; border-radius: 8px; font-size: 12px; font-weight: 700;
    cursor: pointer; border: none; letter-spacing: .5px; text-transform: uppercase;
    transition: all .15s; outline: none;
  }
  .btn-reset { background: rgba(83,52,131,.4); border: 1px solid var(--purple); color: var(--purple-l); }
  .btn-reset:hover { background: rgba(83,52,131,.7); }
  .btn-reveal { background: linear-gradient(135deg, var(--purple), var(--red)); color: #fff; border: none; box-shadow: 0 0 20px rgba(233,69,96,.35); }
  .btn-reveal:hover { box-shadow: 0 0 32px rgba(233,69,96,.6); transform: scale(1.04); }

  /* ──── TABS ──── */
  .tabs-wrap { background: var(--bg2); border-bottom: 1px solid var(--card-border); overflow-x: auto; }
  .tabs { display: flex; max-width: 1200px; margin: 0 auto; padding: 0 24px; gap: 2px; }
  .tab {
    padding: 13px 16px; font-size: 12px; font-weight: 600; color: var(--text-dim);
    cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap;
    transition: all .15s; letter-spacing: .3px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--red-l); border-bottom-color: var(--red); }

  /* ──── MAIN ──── */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* ──── TIER LIST ──── */
  .tier-list { display: flex; flex-direction: column; gap: 8px; }

  .tier-row {
    display: flex; gap: 8px; border-radius: 10px; overflow: hidden;
    border: 1px solid rgba(255,255,255,.06); transition: box-shadow .2s;
  }
  .tier-row:hover { box-shadow: 0 0 0 1px rgba(255,255,255,.1); }

  .tier-label {
    width: 58px; min-width: 58px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-weight: 900;
    font-size: 22px; letter-spacing: -1px; padding: 12px 6px;
    user-select: none;
  }
  .tier-label .tier-name { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; opacity: .7; margin-top: 2px; }

  .tier-S .tier-label { background: #2a1f00; color: var(--gold); }
  .tier-A .tier-label { background: #1a2a10; color: #7fff50; }
  .tier-B .tier-label { background: #101a2e; color: #5aadff; }
  .tier-C .tier-label { background: #1a1a1a; color: #aaaaaa; }
  .tier-D .tier-label { background: #1e1010; color: #aa6644; }
  .tier-F .tier-label { background: #200808; color: #e94560; }

  .tier-content {
    flex: 1; background: rgba(255,255,255,.03); padding: 8px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    min-height: 68px;
  }
  .tier-content.drag-over {
    background: rgba(233,69,96,.08);
    outline: 2px dashed rgba(233,69,96,.5);
    outline-offset: -2px;
  }

  /* ──── MEMBER CARDS ──── */
  .member-card {
    width: 72px; border-radius: 10px; overflow: hidden; cursor: grab;
    background: var(--card); border: 1px solid var(--card-border);
    transition: transform .12s, box-shadow .12s, border-color .12s;
    position: relative; user-select: none;
    flex-shrink: 0;
  }
  .member-card:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 6px 18px rgba(0,0,0,.5); }
  .member-card.dragging { opacity: .45; transform: scale(.9); cursor: grabbing; }
  .member-card.placing { animation: popIn .4s cubic-bezier(.18,1.6,.4,1) forwards; }

  @keyframes popIn {
    from { transform: scale(0) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);  opacity: 1; }
  }

  .card-avatar {
    height: 48px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #fff;
    position: relative;
  }
  .card-pseudo {
    text-align: center; font-size: 10px; font-weight: 700;
    padding: 4px 3px 6px; color: var(--text); line-height: 1.2;
    background: rgba(0,0,0,.3);

    display: flex; justify-content: center; gap: 2px; flex-wrap: wrap;
    padding: 0 3px 5px; min-height: 18px;
  }
  .card-badge {
    font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .2px; white-space: nowrap;
    overflow: hidden; max-width: 65px; text-overflow: ellipsis;
  }

  /* ──── POOL ──── */
  .pool-section { margin-top: 24px; }
  .pool-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
  .pool {
    background: rgba(255,255,255,.03); border: 1px dashed rgba(255,255,255,.12);
    border-radius: 10px; padding: 12px; display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 68px;

  .pool.drag-over {
    background: rgba(83,52,131,.08);
    border-color: rgba(83,52,131,.5);
  }

  /* ──── TOOLTIP ──── */
  .tooltip-box {
    position: fixed; background: #0d0d1f; border: 1px solid var(--purple);
    border-radius: 10px; padding: 12px 14px; max-width: 260px; font-size: 12px;
    line-height: 1.55; pointer-events: none; z-index: 9999;
    box-shadow: 0 8px 24px rgba(0,0,0,.7); color: var(--text);
    opacity: 0; transition: opacity .15s;
  }
  .tooltip-box.visible { opacity: 1; }
  .tooltip-pseudo { font-weight: 800; color: var(--red-l); margin-bottom: 6px; font-size: 13px; }
  .tooltip-tier { font-size: 10px; color: var(--purple-l); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .tooltip-text { color: #bbb; }

  /* ──── PODIUM (global tab) ──── */
  .podium { display: flex; justify-content: center; align-items: flex-end; gap: 16px; margin: 32px 0; }
  .podium-slot { text-align: center; display: flex; flex-direction: column; align-items: center; }
  .podium-block {
    width: 120px; border-radius: 8px 8px 0 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 32px; font-weight: 900; color: rgba(255,255,255,.4);
  }
  .podium-1 .podium-block { height: 110px; background: linear-gradient(to top, #3a2800, #5a3c00); border: 2px solid var(--gold); color: var(--gold); }
  .podium-2 .podium-block { height: 80px; background: linear-gradient(to top, #1e1e1e, #2e2e2e); border: 2px solid var(--silver); color: var(--silver); }
  .podium-3 .podium-block { height: 60px; background: linear-gradient(to top, #2a1500, #3a2000); border: 2px solid var(--bronze); color: var(--bronze); }

  .podium-name { font-size: 13px; font-weight: 800; margin-top: 10px; }
  .podium-score { font-size: 11px; color: var(--text-dim); }

  .ranking-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
  .ranking-table th { text-align: left; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px; border-bottom: 1px solid var(--card-border); }
  .ranking-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 13px; }
  .ranking-table tr:hover td { background: rgba(255,255,255,.03); }
  .rank-num { font-weight: 900; width: 36px; }
  .rank-bar { height: 6px; border-radius: 3px; background: linear-gradient(90deg, var(--purple), var(--red)); }

  .score-pill {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-weight: 800; font-size: 12px;
  }

  /* ──── ANIMATIONS reveal ──── */
  @keyframes flyIn {
    from { transform: scale(0) rotate(720deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);   opacity: 1; }

  @media (max-width: 600px) {
    .member-card { width: 62px; }
    .tier-label { width: 46px; min-width: 46px; font-size: 18px; }
    .tabs { padding: 0 8px; }
    .tab { padding: 10px 10px; font-size: 11px; }
  }

  /* ──── FLASH / CONFETTI ──── */
  .flash { animation: flash .3s ease; }
  @keyframes flash { 0%,100% { filter: none; } 50% { filter: brightness(2); } }

  .star { position: fixed; font-size: 20px; pointer-events: none; z-index: 9998; animation: starFall 1.5s ease-in forwards; }
  @keyframes starFall { from { opacity: 1; transform: translateY(0) rotate(0); } to { opacity: 0; transform: translateY(300px) rotate(720deg); } }
</style>
</head>

// Score mapping for global ranking
const TIER_SCORES = { S: 6, A: 5, B: 4, C: 3, D: 2, F: 1 };
// For toxicité (crit 5), invert : S=1, F=6
const TOX_SCORES = { S: 1, A: 2, B: 3, C: 4, D: 5, F: 6 };

const CRIT_LABELS = [
  '🧠 Qualité des arguments',
  '🎣 Niveau de ragebait',
  '😂 Humour',
  '👑 Influence',
  '🎯 Cohérence intellectuelle',
  '☢️ Toxicité',
  '💡 Originalité',
  '🏆 Utilité',
  '★ Classement global'
];

const TIER_META = {
  S: { label: 'S', name: 'Légendaire', bg: 'linear-gradient(135deg,#3a2800,#5a3c00)', color: '#ffd700' },
  A: { label: 'A', name: 'Excellent', bg: 'linear-gradient(135deg,#1a2a10,#243614)', color: '#7fff50' },
  B: { label: 'B', name: 'Bon', bg: 'linear-gradient(135deg,#101828,#18263c)', color: '#5aadff' },

};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let currentCrit = 0;
// userTiers[crit][tier] = [id, id, ...]
let userTiers = {};

function initUserTiers() {
  for (let c = 0; c < 8; c++) {
    userTiers[c] = { S:[], A:[], B:[], C:[], D:[], F:[], pool:[] };
    for (const tier of ['S','A','B','C','D','F']) {
      userTiers[c][tier] = [...(DEFAULT_TIERS[c][tier] || [])];
    }
  }
}
initUserTiers();

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function getMember(id) { return MEMBERS.find(m => m.id === id); }

function computeGlobalScores() {
  const scores = {};
  MEMBERS.forEach(m => { scores[m.id] = 0; });
  for (let c = 0; c < 8; c++) {
    const sc = c === 5 ? TOX_SCORES : TIER_SCORES;
    for (const [tier, ids] of Object.entries(userTiers[c])) {
      if (tier === 'pool') continue;
      const v = sc[tier] || 3;
      ids.forEach(id => { if (scores[id] !== undefined) scores[id] += v; });
    }
  }
  return scores;
}

// ═══════════════════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════════════════
let dragId = null;
let dragCrit = null;
let dragFrom = null; // tier key

function makeDraggable(el, id, crit, fromKey) {
  el.draggable = true;
  el.addEventListener('dragstart', e => {
    dragId = id; dragCrit = crit; dragFrom = fromKey;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));
}

function makeDropZone(el, toKey) {
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (dragId && dragCrit === currentCrit) {
      // Remove from source
      const src = userTiers[dragCrit][dragFrom];
      const idx = src.indexOf(dragId);
      if (idx > -1) src.splice(idx, 1);
      // Add to dest
      if (!userTiers[dragCrit][toKey]) userTiers[dragCrit][toKey] = [];
      userTiers[dragCrit][toKey].push(dragId);
      renderCurrent();
    }
  });
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function buildCard(id, crit) {
  const m = getMember(id);
  if (!m) return null;
  const el = document.createElement('div');
  el.className = 'member-card';
  el.dataset.id = id;
  el.style.borderColor = m.color + '60';

  const badges = m.badges.slice(0, 2).map(b =>
    `<span class="card-badge" style="background:${m.color}22;color:${m.color};border:1px solid ${m.color}44">${b}</span>`
  ).join('');

  el.innerHTML = `
    <div class="card-avatar" style="background:linear-gradient(135deg,${m.color}44,${m.color}22)">
      <span style="color:${m.color}">${m.initials}</span>
    </div>
    <div class="card-pseudo">${m.pseudo}</div>
    <div class="card-badges">${badges}</div>
  `;

  // Tooltip
  el.addEventListener('mouseenter', ev => showTooltip(ev, id, crit));
  el.addEventListener('mousemove', ev => moveTooltip(ev));
  el.addEventListener('mouseleave', () => hideTooltip());

  return el;
}

function renderCurrent() {
  if (currentCrit === 8) { renderGlobal(); return; }
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const list = document.createElement('div');
  list.className = 'tier-list';

  for (const tier of ['S','A','B','C','D','F']) {
    const row = document.createElement('div');
    row.className = `tier-row tier-${tier}`;

    const label = document.createElement('div');
    label.className = 'tier-label';
    label.innerHTML = `${tier}<div class="tier-name">${TIER_META[tier].name}</div>`;
    row.appendChild(label);

    const content = document.createElement('div');
    content.className = 'tier-content';
    makeDropZone(content, tier);

    (userTiers[currentCrit][tier] || []).forEach(id => {
      const card = buildCard(id, currentCrit);
      if (card) {
        makeDraggable(card, id, currentCrit, tier);
        content.appendChild(card);
      }
    });

    row.appendChild(content);
    list.appendChild(row);
  }

  main.appendChild(list);

  // Pool section (unplaced)
  const poolIds = userTiers[currentCrit].pool || [];
  // Also collect any unassigned members
  const allPlaced = new Set(['S','A','B','C','D','F'].flatMap(t => userTiers[currentCrit][t] || []));
  const unplaced = MEMBERS.map(m=>m.id).filter(id => !allPlaced.has(id));
  if (unplaced.length > 0 || poolIds.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'pool-section';
    sec.innerHTML = '<div class="pool-title">⬛ Non classés — glissez vers un tier</div>';
    const pool = document.createElement('div');
    pool.className = 'pool';
    makeDropZone(pool, 'pool');
    [...poolIds, ...unplaced].forEach(id => {
      const card = buildCard(id, currentCrit);
      if (card) { makeDraggable(card, id, currentCrit, 'pool'); pool.appendChild(card); }
    });
    sec.appendChild(pool);
    main.appendChild(sec);
  }
}

function renderGlobal() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const scores = computeGlobalScores();
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const maxScore = sorted[0][1];

  // Podium
  const podium = document.createElement('div');
  podium.className = 'podium';

  const podiumOrder = [1, 0, 2]; // 2nd, 1st, 3rd
  const heights = ['80px','110px','60px'];
  const emojis = ['🥈','🥇','🥉'];
  const cls = ['podium-2','podium-1','podium-3'];

  podiumOrder.forEach((pos, i) => {
    const [id, score] = sorted[pos];
    const m = getMember(id);
    const slot = document.createElement('div');
    slot.className = `podium-slot ${cls[i]}`;
    slot.innerHTML = `
      <div class="podium-block" style="height:${heights[i]};border-color:${m.color}">${emojis[i]}</div>
      <div style="width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,${m.color}44,${m.color}22);border:3px solid ${m.color};display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:${m.color};margin:10px auto 0">${m.initials}</div>
      <div class="podium-name" style="color:${m.color}">${m.pseudo}</div>
      <div class="podium-score">${score} pts</div>
    `;
    podium.appendChild(slot);
  });
  main.appendChild(podium);

  // Full ranking table
  const tbl = document.createElement('table');
  tbl.className = 'ranking-table';
  tbl.innerHTML = `<thead><tr>
    <th>#</th><th>Membre</th><th>Score total</th><th>Barre</th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');
  sorted.forEach(([id, score], i) => {
    const m = getMember(id);
    const pct = Math.round(score / maxScore * 100);
    const tr = document.createElement('tr');
    const medals = ['🥇','🥈','🥉'];
    tr.innerHTML = `
      <td class="rank-num" style="color:${m.color}">${medals[i] || (i+1)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,${m.color}44,${m.color}22);border:2px solid ${m.color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:${m.color};flex-shrink:0">${m.initials}</div>
          <span style="font-weight:700">${m.pseudo}</span>
        </div>
      </td>
      <td><span class="score-pill" style="background:${m.color}22;color:${m.color};border:1px solid ${m.color}44">${score} pts</span></td>
      <td style="width:35%"><div class="rank-bar" style="width:${pct}%;background:linear-gradient(90deg,${m.color}88,${m.color})"></div></td>
    `;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  main.appendChild(tbl);
}

// ═══════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════
let ttTimeout;
const ttBox = () => document.getElementById('tooltip');

function showTooltip(ev, id, crit) {
  const m = getMember(id);
  const box = ttBox();
  document.getElementById('tt-pseudo').textContent = m.pseudo;

  // Find current tier
  let tierLabel = '';
  for (const [t, ids] of Object.entries(userTiers[crit])) {
    if (t !== 'pool' && ids.includes(id)) { tierLabel = `Tier ${t} — ${CRIT_LABELS[crit]}`; break; }
  }
  document.getElementById('tt-tier').textContent = tierLabel;
  document.getElementById('tt-text').textContent = m.tips[crit] || '';

  box.classList.add('visible');
  moveTooltip(ev);
}

function moveTooltip(ev) {
  const box = ttBox();
  const x = ev.clientX + 16;
  const y = ev.clientY + 16;
  box.style.left = Math.min(x, window.innerWidth - 280) + 'px';
  box.style.top = Math.min(y, window.innerHeight - 160) + 'px';
}

function hideTooltip() {
  ttBox().classList.remove('visible');
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function switchCrit(n) {
  currentCrit = n;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
  renderCurrent();
}

function resetTierList() {
  initUserTiers();
  renderCurrent();
}

function revealAll() {
  initUserTiers();
  // Animate
  renderCurrent();
  const cards = document.querySelectorAll('.member-card');
  cards.forEach((c, i) => {
    c.style.opacity = '0';
    setTimeout(() => {
      c.style.opacity = '1';
      c.classList.add('placing');
      setTimeout(() => c.classList.remove('placing'), 500);
    }, i * 60);
  });

  // Confetti burst
  for (let i = 0; i < 18; i++) {
    setTimeout(() => spawnStar(), i * 80);
  }
}

function spawnStar() {
  const stars = ['⭐','🎯','🔥','💥','✨','🏆','👑','💡'];
  const el = document.createElement('div');
  el.className = 'star';
  el.textContent = stars[Math.floor(Math.random() * stars.length)];
  el.style.left = (10 + Math.random() * 80) + 'vw';
  el.style.top = (10 + Math.random() * 40) + 'vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
renderCurrent();
